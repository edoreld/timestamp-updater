name: Update Discord Message

on:
  schedule:
    - cron: '0 12 * * *'   # Every day at noon UTC
  workflow_dispatch:        # Allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write       # Required to update repository variables
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run bot
        id: bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          MESSAGE_ID: ${{ vars.MESSAGE_ID }}
        run: node index.js

      - name: Save new message ID as Actions variable
        if: steps.bot.outputs.new_message_id != ''
        env:
          # Change this line to use your new Secret
          GH_TOKEN: ${{ secrets.BOT_PAT }} 
          NEW_ID: ${{ steps.bot.outputs.new_message_id }}
        run: |
          gh variable set MESSAGE_ID --body "$NEW_ID"