name: Update Discord Message

on:
  schedule:
    - cron: '0 12 * * *'   # Every day at noon UTC
  workflow_dispatch:        # Allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run bot
        id: bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          MESSAGE_ID: ${{ vars.MESSAGE_ID }}
        run: node index.js

      - name: Save new message ID as Actions variable
        if: steps.bot.outputs.new_message_id != ''
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/MESSAGE_ID" \
            -d "{\"name\":\"MESSAGE_ID\",\"value\":\"${{ steps.bot.outputs.new_message_id }}\"}" \
          || curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables" \
            -d "{\"name\":\"MESSAGE_ID\",\"value\":\"${{ steps.bot.outputs.new_message_id }}\"}"